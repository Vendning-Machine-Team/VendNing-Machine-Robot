<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Robot Login</title>
  <link href="Startpage.css" rel="stylesheet" />
  <script src="Startpage.js" defer></script>
</head>
<body>
  <div class="login-box">
    <h2 id="robot-name"></h2>
    <button id="admin-login">Admin Login</button><br>
    <button id="pay-service">Pay for Snack</button>
  </div>

  <script>
    // Easily change robot's name here:
    const robotName = "Munchin"; 
    document.getElementById("robot-name").textContent = `Name of Robot: ${robotName}`;

    // Example actions for buttons
    document.getElementById("admin-login").onclick = () => alert(`${robotName} Admin Login`);
    document.getElementById("pay-service").onclick = () => alert(`Proceed to payment on ${robotName}`);
  </script>

</body>
</html>
